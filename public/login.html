<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicroBlog — Acceso</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

    <script>
        if (localStorage.getItem('currentUser')) window.location.replace('index.html');
    </script>

    <div class="login-card">
        <div class="login-logo">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
            </svg>
        </div>

        <!-- Tabs -->
        <div class="login-tabs">
            <button class="login-tab active" id="tab-login" onclick="showTab('login')">Iniciar sesión</button>
            <button class="login-tab" id="tab-register" onclick="showTab('register')">Crear cuenta</button>
        </div>

        <div id="login-error" class="login-error" style="display:none;"></div>

        <!-- Formulario: Login -->
        <div id="form-login">
            <h2 class="login-title">Bienvenido de nuevo</h2>
            <div class="form-group">
                <label class="form-label">Nombre de usuario</label>
                <input class="form-input" type="text" id="login-username"
                       placeholder="ej: carlos_dev" autocomplete="username">
            </div>
            <div class="form-group">
                <label class="form-label">Contraseña</label>
                <input class="form-input" type="password" id="login-password"
                       placeholder="Tu contraseña" autocomplete="current-password">
            </div>
            <button class="btn-post" id="btn-login" onclick="doLogin()"
                    style="width:100%;margin-top:8px;padding:12px;">
                Iniciar sesión
            </button>
        </div>

        <!-- Formulario: Registro -->
        <div id="form-register" style="display:none;">
            <h2 class="login-title">Crear cuenta</h2>
            <div class="form-group">
                <label class="form-label">Nombre de usuario *</label>
                <input class="form-input" type="text" id="reg-username"
                       placeholder="ej: juan_perez" autocomplete="username">
            </div>
            <div class="form-group">
                <label class="form-label">Nombre visible</label>
                <input class="form-input" type="text" id="reg-nombre"
                       placeholder="ej: Juan Pérez">
            </div>
            <div class="form-group">
                <label class="form-label">Correo electrónico *</label>
                <input class="form-input" type="email" id="reg-correo"
                       placeholder="ej: juan@correo.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label class="form-label">Biografía</label>
                <input class="form-input" type="text" id="reg-bio"
                       placeholder="Algo sobre ti...">
            </div>
            <div class="form-group">
                <label class="form-label">Contraseña *</label>
                <input class="form-input" type="password" id="reg-password"
                       placeholder="Elige una contraseña" autocomplete="new-password">
            </div>
            <button class="btn-post" id="btn-register" onclick="doRegister()"
                    style="width:100%;margin-top:8px;padding:12px;">
                Crear cuenta
            </button>
        </div>
    </div>

    <script>
        function showTab(tab) {
            document.getElementById('form-login').style.display    = tab === 'login'    ? 'flex' : 'none';
            document.getElementById('form-register').style.display = tab === 'register' ? 'flex' : 'none';
            document.getElementById('tab-login').classList.toggle('active', tab === 'login');
            document.getElementById('tab-register').classList.toggle('active', tab === 'register');
            document.getElementById('login-error').style.display = 'none';
            // init flex direction for forms
            document.getElementById('form-login').style.flexDirection = 'column';
            document.getElementById('form-login').style.gap = '16px';
            document.getElementById('form-register').style.flexDirection = 'column';
            document.getElementById('form-register').style.gap = '16px';
        }

        // Aplicar flex a los forms al cargar
        document.addEventListener('DOMContentLoaded', () => {
            ['form-login','form-register'].forEach(id => {
                const el = document.getElementById(id);
                el.style.flexDirection = 'column';
                el.style.gap = '16px';
            });
            document.getElementById('form-login').style.display = 'flex';
        });

        function showError(msg) {
            const el = document.getElementById('login-error');
            el.textContent = msg;
            el.style.display = 'block';
        }

        document.addEventListener('keydown', e => {
            if (e.key !== 'Enter') return;
            const loginVisible = document.getElementById('form-login').style.display !== 'none';
            if (loginVisible) doLogin(); else doRegister();
        });

        async function doLogin() {
            const nombreUsuario  = document.getElementById('login-username').value.trim();
            const hashContraseña = document.getElementById('login-password').value;
            document.getElementById('login-error').style.display = 'none';
            if (!nombreUsuario || !hashContraseña) return showError('Completa todos los campos');

            const btn = document.getElementById('btn-login');
            btn.disabled = true;
            btn.textContent = 'Verificando...';
            try {
                const res  = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombreUsuario, hashContraseña })
                });
                const data = await res.json();
                if (!res.ok) return showError(data.error || 'Credenciales incorrectas');
                localStorage.setItem('currentUser', JSON.stringify(data));
                window.location.replace('index.html');
            } catch {
                showError('No se pudo conectar con el servidor');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Iniciar sesión';
            }
        }

        async function doRegister() {
            const nombreUsuario  = document.getElementById('reg-username').value.trim();
            const nombreVisible  = document.getElementById('reg-nombre').value.trim();
            const correo         = document.getElementById('reg-correo').value.trim();
            const biografia      = document.getElementById('reg-bio').value.trim();
            const hashContraseña = document.getElementById('reg-password').value;
            document.getElementById('login-error').style.display = 'none';
            if (!nombreUsuario || !correo || !hashContraseña) return showError('Usuario, correo y contraseña son obligatorios');

            const btn = document.getElementById('btn-register');
            btn.disabled = true;
            btn.textContent = 'Creando cuenta...';
            try {
                const res  = await fetch('/api/usuarios', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombreUsuario, nombreVisible, correo, biografia, hashContraseña })
                });
                const data = await res.json();
                if (!res.ok) return showError(data.error || 'No se pudo crear la cuenta');
                // Auto-login tras registro
                const login = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombreUsuario, hashContraseña })
                });
                const user = await login.json();
                localStorage.setItem('currentUser', JSON.stringify(user));
                window.location.replace('index.html');
            } catch {
                showError('No se pudo conectar con el servidor');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Crear cuenta';
            }
        }
    </script>
</body>
</html>
