<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicroBlog</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <script>
        if (!localStorage.getItem('currentUser')) window.location.replace('login.html');
    </script>
    <div class="layout">

        <!-- ===== SIDEBAR IZQUIERDO ===== -->
        <aside class="sidebar-left">
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
                <span>MicroBlog</span>
            </div>

            <nav class="nav-menu">
                <a href="#" class="nav-item active" data-view="feed">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                    <span>Inicio</span>
                </a>
                <a href="#" class="nav-item" data-view="usuarios">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                    <span>Usuarios</span>
                </a>
                <a href="#" class="nav-item" data-view="etiquetas">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.41 11.58l-9-9C12.05 2.22 11.55 2 11 2H4c-1.1 0-2 .9-2 2v7c0 .55.22 1.05.59 1.42l9 9c.36.37.86.58 1.41.58s1.05-.21 1.41-.59l7-7c.37-.36.59-.86.59-1.41s-.23-1.06-.59-1.42zM5.5 7C4.67 7 4 6.33 4 5.5S4.67 4 5.5 4 7 4.67 7 5.5 6.33 7 5.5 7z"/></svg>
                    <span>Etiquetas</span>
                </a>
                <a href="#" class="nav-item" data-view="perfil">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
                    <span>Mi perfil</span>
                </a>
            </nav>

            <!-- Chip usuario actual -->
            <div class="user-chip" id="user-chip">
                <div class="post-avatar user-chip-avatar" id="chip-avatar">?</div>
                <div class="user-chip-info">
                    <div class="user-chip-name" id="chip-nombre">—</div>
                    <div class="user-chip-username" id="chip-username">@—</div>
                </div>
                <button class="btn-chip-logout" onclick="logout()" title="Cerrar sesión">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
                </button>
            </div>

            <div class="sidebar-stats" id="sidebar-stats">
                <div class="stat-chip"><span class="stat-num" id="stat-posts">—</span><span>Posts</span></div>
                <div class="stat-chip"><span class="stat-num" id="stat-users">—</span><span>Usuarios</span></div>
            </div>
        </aside>

        <!-- ===== FEED PRINCIPAL ===== -->
        <main class="feed">
            <header class="feed-header">
                <h1 id="feed-title">Inicio</h1>
                <div class="search-bar">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                    <input type="text" id="search-input" placeholder="Buscar publicaciones...">
                </div>
            </header>

            <!-- Vista: Feed de publicaciones -->
            <div id="view-feed">
                <!-- Compose Box -->
                <div class="compose-box">
                    <div class="post-avatar" id="compose-avatar" style="background:var(--bg3)">?</div>
                    <div class="compose-right">
                        <span class="compose-username" id="compose-username"></span>
                        <textarea id="compose-text" class="compose-textarea" placeholder="¿Qué está pasando?" rows="3"></textarea>
                        <div class="compose-footer">
                            <input type="text" id="compose-tags" class="compose-tags-input" placeholder="etiquetas: tech, colombia...">
                            <button id="btn-submit-post" class="btn-post" onclick="submitPost()">Publicar</button>
                        </div>
                    </div>
                </div>
                <div id="posts-container">
                    <div class="skeleton-loader">
                        <div class="skeleton-post"></div>
                        <div class="skeleton-post"></div>
                        <div class="skeleton-post"></div>
                    </div>
                </div>
                <div id="load-more-wrapper" style="display:none;">
                    <button id="btn-load-more" class="btn-load-more">Cargar más</button>
                </div>
            </div>

            <!-- Vista: Usuarios -->
            <div id="view-usuarios" style="display:none;">
                <div class="create-user-header">
                    <span>Todos los usuarios</span>
                </div>
                <div id="usuarios-container"></div>
            </div>

            <!-- Vista: Perfil -->
            <div id="view-perfil" style="display:none;">
                <div id="perfil-container"></div>
            </div>

            <!-- Vista: Etiquetas -->
            <div id="view-etiquetas" style="display:none;">
                <div id="etiquetas-container"></div>
            </div>
        </main>

        <!-- ===== SIDEBAR DERECHO ===== -->
        <aside class="sidebar-right">
            <div class="widget">
                <h2 class="widget-title">Tendencias</h2>
                <div id="trending-container">
                    <div class="skeleton-tag"></div>
                    <div class="skeleton-tag"></div>
                    <div class="skeleton-tag"></div>
                </div>
            </div>
            <div class="widget">
                <h2 class="widget-title">A quién seguir</h2>
                <div id="suggest-container"></div>
            </div>
        </aside>

    </div>

    <!-- Modal de post expandido -->
    <div id="modal-overlay" class="modal-overlay" style="display:none;">
        <div class="modal-card">
            <button class="modal-close" id="modal-close">✕</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
